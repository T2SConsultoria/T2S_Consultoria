<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 215" font-family="Inter,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#546E7A"/></marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#E53935"/></marker>
    <marker id="ao" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#F57F17"/></marker>
  </defs>
  <rect width="800" height="215" fill="#ffffff" rx="6" stroke="#CFD8DC" stroke-width="1.5"/>
  <text x="400" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0F1C2E">Processo de Manutenção Industrial</text>
  <text x="400" y="205" text-anchor="middle" font-size="9" fill="#90A4AE">Fluxo BPMN · Estilo Bizagi</text>

  <!-- START -->
  <circle cx="45" cy="98" r="14" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <circle cx="45" cy="98" r="5" fill="#43A047"/>
  <text x="45" y="124" text-anchor="middle" font-size="8" fill="#78909C">Início</text>
  <line x1="59" y1="98" x2="74" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T1: Solicitar OS -->
  <rect x="76" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="136" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Solicitar</text>
  <text x="136" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Ordem de Serviço</text>
  <line x1="196" y1="98" x2="214" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T2: Diagnóstico -->
  <rect x="216" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="276" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Diagnóstico</text>
  <text x="276" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">da Falha</text>
  <line x1="336" y1="98" x2="355" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW: Tipo? -->
  <polygon points="383,70 411,98 383,126 355,98" fill="#FDD835" stroke="#F57F17" stroke-width="1.5"/>
  <text x="383" y="95" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1B2A3D">Tipo?</text>

  <!-- Corretiva (main) → T3 -->
  <line x1="411" y1="98" x2="432" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="418" y="92" text-anchor="middle" font-size="8" fill="#2E7D32">Corretiva</text>

  <!-- T3: Reparo -->
  <rect x="434" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="494" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Execução</text>
  <text x="494" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">do Reparo</text>
  <line x1="554" y1="98" x2="572" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T4: Liberação -->
  <rect x="574" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="634" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Teste e</text>
  <text x="634" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Liberação</text>
  <line x1="694" y1="98" x2="710" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- END -->
  <circle cx="728" cy="98" r="16" fill="none" stroke="#B71C1C" stroke-width="5"/>
  <text x="728" y="124" text-anchor="middle" font-size="8" fill="#78909C">Fim</text>

  <!-- GW → Preventiva (branch down) -->
  <line x1="383" y1="126" x2="383" y2="150" stroke="#F57F17" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="392" y="143" font-size="8" fill="#F57F17">Preventiva</text>

  <!-- Branch T: Planejar -->
  <rect x="315" y="152" width="136" height="34" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="383" y="168" text-anchor="middle" font-size="10" fill="#0F1C2E">Planejar</text>
  <text x="383" y="182" text-anchor="middle" font-size="10" fill="#0F1C2E">Preventiva</text>

  <!-- Branch → Execução T4 (same Liberação) via path up -->
  <line x1="451" y1="169" x2="494" y2="169" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="494" y1="169" x2="494" y2="116" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
