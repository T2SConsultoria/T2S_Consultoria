<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 215" font-family="Inter,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#546E7A"/></marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#E53935"/></marker>
  </defs>
  <rect width="800" height="215" fill="#ffffff" rx="6" stroke="#CFD8DC" stroke-width="1.5"/>
  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0F1C2E">Processo de Produção — Linha de Envase</text>
  <!-- Subtitle labels -->
  <text x="400" y="205" text-anchor="middle" font-size="9" fill="#90A4AE">Fluxo BPMN · Estilo Bizagi</text>

  <!-- START -->
  <circle cx="45" cy="98" r="14" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <circle cx="45" cy="98" r="5" fill="#43A047"/>
  <text x="45" y="124" text-anchor="middle" font-size="8" fill="#78909C">Início</text>
  <line x1="59" y1="98" x2="74" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T1: Receber MP -->
  <rect x="76" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="136" y="103" text-anchor="middle" font-size="10" fill="#0F1C2E">Receber MP</text>
  <line x1="196" y1="98" x2="214" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T2: Inspeção de Entrada -->
  <rect x="216" y="80" width="130" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="281" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Inspeção de</text>
  <text x="281" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Entrada</text>
  <line x1="346" y1="98" x2="360" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW: MP Conforme? -->
  <polygon points="388,70 416,98 388,126 360,98" fill="#FDD835" stroke="#F57F17" stroke-width="1.5"/>
  <text x="388" y="95" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1B2A3D">MP</text>
  <text x="388" y="107" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1B2A3D">OK?</text>

  <!-- GW → Sim → T3 -->
  <line x1="416" y1="98" x2="434" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="423" y="92" text-anchor="middle" font-size="8" fill="#2E7D32">Sim</text>

  <!-- T3: Produção/Envase -->
  <rect x="436" y="80" width="125" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="498" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Produção /</text>
  <text x="498" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Envase</text>
  <line x1="561" y1="98" x2="578" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T4: Controlo de Qualidade -->
  <rect x="580" y="80" width="125" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="642" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Controlo de</text>
  <text x="642" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Qualidade</text>
  <line x1="705" y1="98" x2="720" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- END -->
  <circle cx="740" cy="98" r="16" fill="none" stroke="#B71C1C" stroke-width="5"/>
  <text x="740" y="124" text-anchor="middle" font-size="8" fill="#78909C">Fim</text>

  <!-- GW → Não → Devolver (branch) -->
  <line x1="388" y1="126" x2="388" y2="150" stroke="#E53935" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="396" y="143" font-size="8" fill="#E53935">Não</text>
  <!-- Branch task -->
  <rect x="320" y="152" width="136" height="34" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="388" y="174" text-anchor="middle" font-size="10" fill="#0F1C2E">Devolver MP</text>
  <!-- Branch → End2 -->
  <line x1="456" y1="169" x2="473" y2="169" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <circle cx="490" cy="169" r="13" fill="none" stroke="#B71C1C" stroke-width="5"/>
  <text x="490" y="193" text-anchor="middle" font-size="8" fill="#78909C">Fim</text>
</svg>
