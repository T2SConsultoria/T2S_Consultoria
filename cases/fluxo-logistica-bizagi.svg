<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 215" font-family="Inter,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#546E7A"/></marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#E53935"/></marker>
  </defs>
  <rect width="800" height="215" fill="#ffffff" rx="6" stroke="#CFD8DC" stroke-width="1.5"/>
  <text x="400" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0F1C2E">Logística de Distribuição — Gestão de Pedidos</text>
  <text x="400" y="205" text-anchor="middle" font-size="9" fill="#90A4AE">Fluxo BPMN · Estilo Bizagi</text>

  <!-- START -->
  <circle cx="45" cy="98" r="14" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <circle cx="45" cy="98" r="5" fill="#43A047"/>
  <text x="45" y="124" text-anchor="middle" font-size="8" fill="#78909C">Início</text>
  <line x1="59" y1="98" x2="74" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T1: Receber Pedido -->
  <rect x="76" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="136" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Receber</text>
  <text x="136" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Pedido</text>
  <line x1="196" y1="98" x2="214" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T2: Verificar Stock -->
  <rect x="216" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="276" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Verificar</text>
  <text x="276" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Stock</text>
  <line x1="336" y1="98" x2="354" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW: Disponível? -->
  <polygon points="382,70 410,98 382,126 354,98" fill="#FDD835" stroke="#F57F17" stroke-width="1.5"/>
  <text x="382" y="92" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1B2A3D">Stock</text>
  <text x="382" y="106" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1B2A3D">OK?</text>

  <!-- Sim → T3 -->
  <line x1="410" y1="98" x2="428" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="417" y="92" text-anchor="middle" font-size="8" fill="#2E7D32">Sim</text>

  <!-- T3: Separação -->
  <rect x="430" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="490" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Separação</text>
  <text x="490" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">e Embalagem</text>
  <line x1="550" y1="98" x2="568" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T4: Entrega -->
  <rect x="570" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="630" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Carregamento</text>
  <text x="630" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">e Entrega</text>
  <line x1="690" y1="98" x2="706" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- END -->
  <circle cx="724" cy="98" r="16" fill="none" stroke="#B71C1C" stroke-width="5"/>
  <text x="724" y="124" text-anchor="middle" font-size="8" fill="#78909C">Fim</text>

  <!-- GW → Não → Comprar Stock (branch) -->
  <line x1="382" y1="126" x2="382" y2="150" stroke="#E53935" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="390" y="143" font-size="8" fill="#E53935">Não</text>

  <!-- Branch T: Comprar Stock -->
  <rect x="314" y="152" width="136" height="34" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="382" y="168" text-anchor="middle" font-size="10" fill="#0F1C2E">Comprar</text>
  <text x="382" y="182" text-anchor="middle" font-size="10" fill="#0F1C2E">Stock</text>

  <!-- Branch → Separação (back to T3) -->
  <line x1="450" y1="169" x2="490" y2="169" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="490" y1="169" x2="490" y2="116" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
