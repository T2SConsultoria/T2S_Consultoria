<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 700" font-family="Inter,Arial,sans-serif">
  <defs>
    <marker id="arrowN" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#546E7A"/>
    </marker>
    <marker id="arrowE" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E53935"/>
    </marker>
    <linearGradient id="swimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F7FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECEFF4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1500" height="700" fill="#ffffff" rx="8" stroke="#CFD8DC" stroke-width="2"/>
  
  <text x="750" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0F1C2E">Processo de Manutenção Industrial — Corretiva e Preventiva</text>
  <text x="750" y="48" text-anchor="middle" font-size="11" fill="#78909C">Fluxo BPMN 2.0 com Múltiplos Responsáveis e Fluxos de Exceção</text>
  
  <!-- Swimlanes -->
  <rect x="20" y="70" width="1460" height="100" fill="url(#swimGrad)" stroke="#B0BEC5" stroke-width="1"/>
  <rect x="20" y="170" width="1460" height="120" fill="url(#swimGrad)" stroke="#B0BEC5" stroke-width="1"/>
  <rect x="20" y="290" width="1460" height="120" fill="url(#swimGrad)" stroke="#B0BEC5" stroke-width="1"/>
  <rect x="20" y="410" width="1460" height="120" fill="url(#swimGrad)" stroke="#B0BEC5" stroke-width="1"/>
  <rect x="20" y="530" width="1460" height="120" fill="url(#swimGrad)" stroke="#B0BEC5" stroke-width="1"/>
  
  <text x="35" y="95" font-size="12" font-weight="600" fill="#37474F">Solicitante / Operação</text>
  <line x1="20" y1="105" x2="1480" y2="105" stroke="#ECEFF4" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="35" y="195" font-size="12" font-weight="600" fill="#37474F">Planejamento de Manutenção</text>
  <line x1="20" y1="205" x2="1480" y2="205" stroke="#ECEFF4" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="35" y="315" font-size="12" font-weight="600" fill="#37474F">Almoxarifado</text>
  <line x1="20" y1="325" x2="1480" y2="325" stroke="#ECEFF4" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="35" y="435" font-size="12" font-weight="600" fill="#37474F">Execução / Técnicos</text>
  <line x1="20" y1="445" x2="1480" y2="445" stroke="#ECEFF4" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="35" y="555" font-size="12" font-weight="600" fill="#37474F">Qualidade / Comissionamento</text>
  <line x1="20" y1="565" x2="1480" y2="565" stroke="#ECEFF4" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- START: Solicitação -->
  <circle cx="120" cy="120" r="16" fill="none" stroke="#2E7D32" stroke-width="3"/>
  <circle cx="120" cy="120" r="7" fill="#43A047"/>
  <text x="120" y="148" text-anchor="middle" font-size="9" fill="#546E7A">Solicitação de</text>
  <text x="120" y="160" text-anchor="middle" font-size="9" fill="#546E7A">Manutenção</text>
  
  <!-- T1: Identificar Falha -->
  <rect x="180" y="102" width="150" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="255" y="117" text-anchor="middle" font-size="10" fill="#0F1C2E">Identificar e</text>
  <text x="255" y="131" text-anchor="middle" font-size="10" fill="#0F1C2E">Reportar Falha</text>
  <line x1="136" y1="120" x2="175" y2="120" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- T2: Abrir OS -->
  <rect x="350" y="102" width="140" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="420" y="117" text-anchor="middle" font-size="10" fill="#0F1C2E">Abrir Ordem de</text>
  <text x="420" y="131" text-anchor="middle" font-size="10" fill="#0F1C2E">Serviço (OS)</text>
  <line x1="330" y1="120" x2="345" y2="120" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- Flow down to Planning -->
  <line x1="490" y1="120" x2="510" y2="120" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="510" y1="120" x2="510" y2="220" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- T3: Analisar Prioridade -->
  <rect x="430" y="202" width="160" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="510" y="217" text-anchor="middle" font-size="10" fill="#0F1C2E">Analisar Criticidade e</text>
  <text x="510" y="231" text-anchor="middle" font-size="10" fill="#0F1C2E">Prioridade</text>
  
  <!-- GW1: Tipo de Manutenção? -->
  <polygon points="660,212 690,240 660,268 630,240" fill="#FDD835" stroke="#F57F17" stroke-width="1.5"/>
  <text x="660" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#1B2A3D">Tipo?</text>
  <line x1="590" y1="220" x2="625" y2="240" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- Path: Preventiva -->
  <line x1="690" y1="240" x2="720" y2="240" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  <text x="710" y="230" font-size="9" fill="#2E7D32" font-weight="600">Prev.</text>
  
  <!-- T4: Agendar Preventiva -->
  <rect x="740" y="222" width="150" height="36" rx="5" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.5"/>
  <text x="815" y="237" text-anchor="middle" font-size="10" fill="#1565C0">Agendar no</text>
  <text x="815" y="251" text-anchor="middle" font-size="10" fill="#1565C0">Plano Preventivo</text>
  
  <!-- Path: Corretiva -->
  <line x1="660" y1="268" x2="660" y2="300" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowE)"/>
  <text x="670" y="290" font-size="9" fill="#C62828" font-weight="600">Corr.</text>
  
  <!-- T5: Verificar Peças -->
  <rect x="580" y="302" width="160" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="660" y="317" text-anchor="middle" font-size="10" fill="#0F1C2E">Verificar Disponibilidade</text>
  <text x="660" y="331" text-anchor="middle" font-size="10" fill="#0F1C2E">de Peças</text>
  
  <!-- GW2: Peças Disponíveis? -->
  <polygon points="810,312 840,340 810,368 780,340" fill="#FDD835" stroke="#F57F17" stroke-width="1.5"/>
  <text x="810" y="335" text-anchor="middle" font-size="9" font-weight="600" fill="#1B2A3D">Peças</text>
  <text x="810" y="348" text-anchor="middle" font-size="9" font-weight="600" fill="#1B2A3D">OK?</text>
  <line x1="740" y1="320" x2="775" y2="340" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- GW2 → Sim -->
  <line x1="840" y1="340" x2="860" y2="340" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  <text x="855" y="330" font-size="9" fill="#2E7D32" font-weight="600">Sim</text>
  
  <!-- T6: Liberar para Execução -->
  <rect x="880" y="322" width="160" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="960" y="337" text-anchor="middle" font-size="10" fill="#0F1C2E">Liberar OS para</text>
  <text x="960" y="351" text-anchor="middle" font-size="10" fill="#0F1C2E">Execução</text>
  
  <!-- GW2 → Não -->
  <line x1="810" y1="368" x2="810" y2="400" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowE)"/>
  <text x="820" y="390" font-size="9" fill="#C62828" font-weight="600">Não</text>
  
  <!-- T7: Gerar Requisição de Compra -->
  <rect x="730" y="402" width="160" height="36" rx="5" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="810" y="417" text-anchor="middle" font-size="10" fill="#E65100">Gerar Requisição de</text>
  <text x="810" y="431" text-anchor="middle" font-size="10" fill="#E65100">Compra</text>
  
  <!-- Intermediate Event: Aguardando Peças -->
  <circle cx="920" cy="420" r="14" fill="#FFF3E0" stroke="#FB8C00" stroke-width="2"/>
  <circle cx="920" cy="420" r="10" fill="none" stroke="#FB8C00" stroke-width="1.5"/>
  <text x="920" y="448" text-anchor="middle" font-size="8" fill="#F57C00">Aguardar</text>
  <text x="920" y="460" text-anchor="middle" font-size="8" fill="#F57C00">Entrega</text>
  <line x1="890" y1="420" x2="905" y2="420" stroke="#FB8C00" stroke-width="1.5"/>
  
  <!-- Flow from Agendar to Execution -->
  <path d="M 890 240 Q 950 240, 950 480 L 970 480" fill="none" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- T8: Executar Manutenção -->
  <rect x="990" y="462" width="150" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="1065" y="477" text-anchor="middle" font-size="10" fill="#0F1C2E">Executar</text>
  <text x="1065" y="491" text-anchor="middle" font-size="10" fill="#0F1C2E">Manutenção</text>
  
  <!-- T9: Registrar Tempo e Materiais -->
  <rect x="1160" y="462" width="160" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="1240" y="477" text-anchor="middle" font-size="10" fill="#0F1C2E">Registrar Tempo e</text>
  <text x="1240" y="491" text-anchor="middle" font-size="10" fill="#0F1C2E">Materiais Usados</text>
  <line x1="1140" y1="480" x2="1155" y2="480" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- Flow up to Quality -->
  <line x1="1320" y1="480" x2="1340" y2="480" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="1340" y1="480" x2="1340" y2="600" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- T10: Testes e Inspeção -->
  <rect x="1260" y="582" width="160" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="1340" y="597" text-anchor="middle" font-size="10" fill="#0F1C2E">Realizar Testes e</text>
  <text x="1340" y="611" text-anchor="middle" font-size="10" fill="#0F1C2E">Inspeção Final</text>
  
  <!-- GW3: Equipamento OK? -->
  <polygon points="1490,592 1520,620 1490,648 1460,620" fill="#FDD835" stroke="#F57F17" stroke-width="1.5"/>
  <text x="1490" y="615" text-anchor="middle" font-size="9" font-weight="600" fill="#1B2A3D">Equip.</text>
  <text x="1490" y="628" text-anchor="middle" font-size="9" font-weight="600" fill="#1B2A3D">OK?</text>
  <line x1="1420" y1="600" x2="1455" y2="620" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- GW3 → Sim -->
  <line x1="1520" y1="620" x2="1540" y2="620" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  <text x="1535" y="610" font-size="9" fill="#2E7D32" font-weight="600">Sim</text>
  
  <!-- T11: Liberar para Produção -->
  <rect x="1560" y="602" width="160" height="36" rx="5" fill="#E8F5E9" stroke="#81C784" stroke-width="1.5"/>
  <text x="1640" y="617" text-anchor="middle" font-size="10" fill="#2E7D32">Liberar para</text>
  <text x="1640" y="631" text-anchor="middle" font-size="10" fill="#2E7D32">Produção</text>
  
  <!-- END: OS Fechada -->
  <circle cx="1750" cy="620" r="18" fill="none" stroke="#B71C1C" stroke-width="5"/>
  <text x="1750" y="650" text-anchor="middle" font-size="9" fill="#546E7A">OS</text>
  <text x="1750" y="662" text-anchor="middle" font-size="9" fill="#546E7A">Fechada</text>
  <line x1="1720" y1="620" x2="1730" y2="620" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrowN)"/>
  
  <!-- GW3 → Não -->
  <line x1="1490" y1="648" x2="1490" y2="680" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowE)"/>
  <text x="1500" y="670" font-size="9" fill="#C62828" font-weight="600">Não</text>
  
  <!-- T12: Gerar Nova OS -->
  <rect x="1410" y="682" width="160" height="36" rx="5" fill="#FFEBEE" stroke="#E57373" stroke-width="1.5"/>
  <text x="1490" y="697" text-anchor="middle" font-size="10" fill="#C62828">Gerar Nova OS para</text>
  <text x="1490" y="711" text-anchor="middle" font-size="10" fill="#C62828">Retrabalho</text>
  
  <!-- Loop back -->
  <path d="M 1410 700 Q 1200 700, 1200 480 L 985 480" fill="none" stroke="#E53935" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowE)"/>
  
  <!-- Legend -->
  <rect x="20" y="665" width="400" height="25" fill="#FAFAFA" stroke="#CFD8DC" stroke-width="1" rx="4"/>
  <text x="35" y="682" font-size="10" fill="#546E7A" font-weight="600">Legenda:</text>
  <circle cx="110" cy="678" r="6" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <text x="125" y="682" font-size="9" fill="#546E7A">Início</text>
  <rect x="180" y="673" width="20" height="10" fill="#fff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="208" y="682" font-size="9" fill="#546E7A">Tarefa</text>
  <polygon points="250,678 256,678 253,683" fill="#FDD835" stroke="#F57F17" stroke-width="1"/>
  <text x="265" y="682" font-size="9" fill="#546E7A">Decisão</text>
  <circle cx="320" cy="678" r="6" fill="none" stroke="#B71C1C" stroke-width="3"/>
  <text x="335" y="682" font-size="9" fill="#546E7A">Fim</text>
  <rect x="380" y="673" width="20" height="10" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1.5"/>
  <text x="408" y="682" font-size="9" fill="#546E7A">Preventiva</text>
</svg>
