<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 215" font-family="Inter,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#546E7A"/></marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#E53935"/></marker>
  </defs>
  <rect width="800" height="215" fill="#ffffff" rx="6" stroke="#CFD8DC" stroke-width="1.5"/>
  <text x="400" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0F1C2E">Onboarding de Colaboradores — RH</text>
  <text x="400" y="205" text-anchor="middle" font-size="9" fill="#90A4AE">Fluxo BPMN · Estilo Bizagi</text>

  <!-- START -->
  <circle cx="45" cy="98" r="14" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <circle cx="45" cy="98" r="5" fill="#43A047"/>
  <text x="45" y="124" text-anchor="middle" font-size="8" fill="#78909C">Início</text>
  <line x1="59" y1="98" x2="74" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T1: Admissão e Docs -->
  <rect x="76" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="136" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Admissão e</text>
  <text x="136" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Documentação</text>
  <line x1="196" y1="98" x2="214" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T2: Preparar Acesso -->
  <rect x="216" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="276" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Preparar</text>
  <text x="276" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">Acessos / Setup</text>
  <line x1="336" y1="98" x2="354" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T3: Integração -->
  <rect x="356" y="80" width="115" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="413" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Integração</text>
  <text x="413" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">e Boas-Vindas</text>
  <line x1="471" y1="98" x2="489" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW: Onboarding Completo? -->
  <polygon points="517,70 545,98 517,126 489,98" fill="#FDD835" stroke="#F57F17" stroke-width="1.5"/>
  <text x="517" y="92" text-anchor="middle" font-size="8" font-weight="600" fill="#1B2A3D">On-</text>
  <text x="517" y="104" text-anchor="middle" font-size="8" font-weight="600" fill="#1B2A3D">board OK?</text>

  <!-- Sim → T4 -->
  <line x1="545" y1="98" x2="563" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="552" y="92" text-anchor="middle" font-size="8" fill="#2E7D32">Sim</text>

  <!-- T4: Avaliação -->
  <rect x="565" y="80" width="120" height="36" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="625" y="96" text-anchor="middle" font-size="10" fill="#0F1C2E">Avaliação</text>
  <text x="625" y="110" text-anchor="middle" font-size="10" fill="#0F1C2E">de Integração</text>
  <line x1="685" y1="98" x2="702" y2="98" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- END -->
  <circle cx="720" cy="98" r="16" fill="none" stroke="#B71C1C" stroke-width="5"/>
  <text x="720" y="124" text-anchor="middle" font-size="8" fill="#78909C">Fim</text>

  <!-- GW → Não → Reforço (branch) -->
  <line x1="517" y1="126" x2="517" y2="150" stroke="#E53935" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="525" y="143" font-size="8" fill="#E53935">Não</text>

  <!-- Branch T: Reforço -->
  <rect x="449" y="152" width="136" height="34" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="517" y="168" text-anchor="middle" font-size="10" fill="#0F1C2E">Reforço</text>
  <text x="517" y="182" text-anchor="middle" font-size="10" fill="#0F1C2E">de Integração</text>

  <!-- Branch → T3 (Integração) loop back -->
  <line x1="449" y1="169" x2="413" y2="169" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="413" y1="169" x2="413" y2="116" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
