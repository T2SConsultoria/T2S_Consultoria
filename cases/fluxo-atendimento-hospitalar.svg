<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Inter,Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6B7280"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2E7D32"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#C62828"/></marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#E6A817"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".08"/></filter>
  </defs>

  <rect width="1200" height="560" fill="#FAFAF8" rx="6"/>
  <rect width="1200" height="3" fill="#C8963E" rx="1"/>

  <text x="600" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1929" letter-spacing=".5">Atendimento Hospitalar — Pronto Socorro</text>

  <!-- Pool border -->
  <rect x="2" y="34" width="1196" height="518" fill="none" stroke="#D5CFC5" stroke-width="1" rx="4"/>
  <rect x="2" y="34" width="30" height="518" fill="#0B1929" rx="4"/>
  <rect x="6" y="34" width="26" height="518" fill="#0B1929"/>
  <text x="17" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#F5F0E8" letter-spacing="2" transform="rotate(-90,17,296)">PRONTO SOCORRO</text>

  <!-- Lane 1: Recepção — y=34-160, cy=97 -->
  <rect x="32" y="34" width="52" height="126" fill="#F3F0EA"/>
  <text x="58" y="100" text-anchor="middle" font-size="8" font-weight="600" fill="#4A4539" transform="rotate(-90,58,100)">Recepção</text>
  <line x1="32" y1="160" x2="1198" y2="160" stroke="#D5CFC5" stroke-width=".8"/>

  <!-- Lane 2: Triagem — y=160-290, cy=225 -->
  <rect x="32" y="160" width="52" height="130" fill="#F3F0EA"/>
  <text x="58" y="228" text-anchor="middle" font-size="8" font-weight="600" fill="#4A4539" transform="rotate(-90,58,228)">Triagem &amp; Classificação</text>
  <line x1="32" y1="290" x2="1198" y2="290" stroke="#D5CFC5" stroke-width=".8"/>

  <!-- Lane 3: Atendimento — y=290-420, cy=355 -->
  <rect x="32" y="290" width="52" height="130" fill="#F3F0EA"/>
  <text x="58" y="358" text-anchor="middle" font-size="8" font-weight="600" fill="#4A4539" transform="rotate(-90,58,358)">Atendimento Médico</text>
  <line x1="32" y1="420" x2="1198" y2="420" stroke="#D5CFC5" stroke-width=".8"/>

  <!-- Lane 4: Internação — y=420-552, cy=486 -->
  <rect x="32" y="420" width="52" height="132" fill="#F3F0EA"/>
  <text x="58" y="489" text-anchor="middle" font-size="8" font-weight="600" fill="#4A4539" transform="rotate(-90,58,489)">Internação</text>

  <line x1="84" y1="34" x2="84" y2="552" stroke="#D5CFC5" stroke-width=".6"/>

  <!-- ===== LANE 1 — cy=97 ===== -->
  <circle cx="112" cy="97" r="12" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <circle cx="112" cy="97" r="4.5" fill="#43A047"/>
  <line x1="124" y1="97" x2="143" y2="97" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="147" y="79" width="126" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="210" y="94" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Chegada do</text>
  <text x="210" y="106" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Paciente</text>
  <line x1="273" y1="97" x2="295" y2="97" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="299" y="79" width="120" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="359" y="101" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Registro / Ficha</text>
  <line x1="419" y1="97" x2="441" y2="97" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="445" y="79" width="130" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="510" y="94" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Triagem</text>
  <text x="510" y="106" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Manchester</text>

  <!-- Down to GW -->
  <path d="M510,115 L510,203" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ===== LANE 2 — cy=225 ===== -->
  <!-- GW1 Classificação -->
  <polygon points="510,203 534,225 510,247 486,225" fill="#F5E6C8" stroke="#C8963E" stroke-width="1.5"/>
  <text x="510" y="222" text-anchor="middle" font-size="7" font-weight="700" fill="#1E3A5F">Risco</text>
  <text x="510" y="232" text-anchor="middle" font-size="7" font-weight="700" fill="#1E3A5F">?</text>

  <!-- Vermelho → right → down -->
  <path d="M534,225 L620,225 L620,337" stroke="#D32F2F" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="575" y="219" font-size="7.5" font-weight="600" fill="#D32F2F">Vermelho</text>

  <!-- Amarelo → down -->
  <path d="M510,247 L510,270 L380,270 L380,337" stroke="#E6A817" stroke-width="1.5" fill="none" marker-end="url(#ay)"/>
  <text x="450" y="266" font-size="7.5" font-weight="600" fill="#E6A817">Amarelo</text>

  <!-- Verde → left → down -->
  <path d="M486,225 L200,225 L200,337" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
  <text x="340" y="219" font-size="7.5" font-weight="600" fill="#2E7D32">Verde</text>

  <!-- ===== LANE 3 — cy=355 ===== -->

  <!-- Waiting boxes for each triage level -->
  <rect x="140" y="337" width="120" height="36" rx="6" fill="#fff" stroke="#2E7D32" stroke-width="1.2" filter="url(#sh)"/>
  <text x="200" y="352" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1E3A5F">Sala de Espera</text>
  <text x="200" y="363" text-anchor="middle" font-size="7.5" fill="#2E7D32">(pouco urgente)</text>

  <rect x="320" y="337" width="120" height="36" rx="6" fill="#fff" stroke="#E6A817" stroke-width="1.2" filter="url(#sh)"/>
  <text x="380" y="352" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1E3A5F">Espera Prioridade</text>
  <text x="380" y="363" text-anchor="middle" font-size="7.5" fill="#E6A817">(urgente)</text>

  <rect x="560" y="337" width="120" height="36" rx="6" fill="#fff" stroke="#D32F2F" stroke-width="1.2" filter="url(#sh)"/>
  <text x="620" y="352" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1E3A5F">Atendimento</text>
  <text x="620" y="363" text-anchor="middle" font-size="7.5" fill="#D32F2F">(imediato)</text>

  <!-- Merge all three → Consulta Médica -->
  <path d="M260,355 L280,355 L280,395 L700,395 L700,355 L720,355" stroke="#6B7280" stroke-width="1.2" fill="none" marker-end="url(#a)"/>
  <path d="M440,355 L460,355 L460,395" stroke="#6B7280" stroke-width="1.2" fill="none"/>
  <path d="M680,355 L700,355" stroke="#6B7280" stroke-width="1.2" fill="none"/>

  <rect x="724" y="337" width="120" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="784" y="359" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Consulta Médica</text>
  <line x1="844" y1="355" x2="862" y2="355" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW2 Exames? -->
  <polygon points="885,333 907,355 885,377 863,355" fill="#F5E6C8" stroke="#C8963E" stroke-width="1.5"/>
  <text x="885" y="352" text-anchor="middle" font-size="7" font-weight="700" fill="#1E3A5F">Exam.</text>
  <text x="885" y="362" text-anchor="middle" font-size="7" font-weight="700" fill="#1E3A5F">?</text>

  <!-- Sim → Exames loop -->
  <path d="M885,333 L885,308 L960,308" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="895" y="318" font-size="7.5" fill="#6B7280">Sim</text>

  <rect x="964" y="292" width="100" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1014" y="307" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1E3A5F">Solicitar</text>
  <text x="1014" y="319" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1E3A5F">Exames</text>

  <path d="M1064,310 L1090,310 L1090,355 L1010,355" stroke="#6B7280" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="1098" y="336" font-size="6.5" fill="#6B7280">Resultados</text>

  <!-- Não → GW3 Internação? -->
  <line x1="907" y1="355" x2="938" y2="355" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="922" y="349" font-size="7.5" fill="#6B7280">Não</text>

  <polygon points="961,333 983,355 961,377 939,355" fill="#F5E6C8" stroke="#C8963E" stroke-width="1.5"/>
  <text x="961" y="352" text-anchor="middle" font-size="7" font-weight="700" fill="#1E3A5F">Int.</text>
  <text x="961" y="362" text-anchor="middle" font-size="7" font-weight="700" fill="#1E3A5F">?</text>

  <!-- Não → Prescrição Alta → End -->
  <line x1="983" y1="355" x2="1012" y2="355" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="997" y="349" font-size="7.5" fill="#6B7280">Não</text>
  <rect x="1016" y="337" width="110" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1071" y="352" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1E3A5F">Prescrição</text>
  <text x="1071" y="363" text-anchor="middle" font-size="8.5" font-weight="500" fill="#1E3A5F">e Alta</text>
  <line x1="1126" y1="355" x2="1145" y2="355" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <circle cx="1160" cy="355" r="11" fill="none" stroke="#C62828" stroke-width="3.5"/>
  <text x="1160" y="378" text-anchor="middle" font-size="7" fill="#9CA3AF">Fim</text>

  <!-- Sim ↓ Lane 4 -->
  <path d="M961,377 L961,430 L140,430 L140,468" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
  <text x="970" y="408" font-size="7.5" font-weight="600" fill="#2E7D32">Sim</text>

  <!-- ===== LANE 4 — cy=486 ===== -->
  <rect x="120" y="468" width="120" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="180" y="490" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Preparar Leito</text>
  <line x1="240" y1="486" x2="265" y2="486" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="269" y="468" width="130" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="334" y="490" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Internar Paciente</text>
  <line x1="399" y1="486" x2="424" y2="486" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="428" y="468" width="130" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="493" y="490" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Acompanhamento</text>
  <line x1="558" y1="486" x2="583" y2="486" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="587" y="468" width="110" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="642" y="490" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Alta Médica</text>
  <line x1="697" y1="486" x2="715" y2="486" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <circle cx="729" cy="486" r="11" fill="none" stroke="#C62828" stroke-width="3.5"/>
  <text x="729" y="509" text-anchor="middle" font-size="7" fill="#9CA3AF">Fim</text>

  <rect y="557" width="1200" height="3" fill="#C8963E" rx="1"/>
</svg>