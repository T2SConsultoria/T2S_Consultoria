<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="Inter,Arial,sans-serif">
  <defs>
    <marker id="a"  markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#546E7A"/></marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#2E7D32"/></marker>
    <marker id="ao" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#E65100"/></marker>
    <filter id="sh" x="-5%" y="-10%" width="110%" height="130%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="1200" height="420" fill="#F7FAFC" rx="8"/>
  <text x="600" y="21" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E3A5F" letter-spacing="0.3">Manutenção Industrial — Gestão de Ordens de Serviço</text>

  <rect x="1" y="28" width="1198" height="390" fill="none" stroke="#B0BEC5" stroke-width="1.5" rx="2"/>
  <rect x="1" y="28" width="33" height="390" fill="#1E3A5F" rx="2"/>
  <text x="17" y="225" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ECEFF1" transform="rotate(-90,17,225)" letter-spacing="2">GESTÃO DE MANUTENÇÃO</text>

  <!-- Lane 1 — Operação -->
  <rect x="34" y="28" width="56" height="130" fill="#EEF2F7"/>
  <text x="62" y="93" text-anchor="middle" font-size="8" font-weight="600" fill="#37474F" transform="rotate(-90,62,93)">Operação</text>
  <line x1="34" y1="158" x2="1199" y2="158" stroke="#CFD8DC" stroke-width="1"/>
  <!-- Lane 2 — Manutenção -->
  <rect x="34" y="158" width="56" height="130" fill="#EEF2F7"/>
  <text x="62" y="223" text-anchor="middle" font-size="8" font-weight="600" fill="#37474F" transform="rotate(-90,62,223)">Manutenção</text>
  <line x1="34" y1="288" x2="1199" y2="288" stroke="#CFD8DC" stroke-width="1"/>
  <!-- Lane 3 — Engenharia & Planejamento -->
  <rect x="34" y="288" width="56" height="130" fill="#EEF2F7"/>
  <text x="62" y="353" text-anchor="middle" font-size="8" font-weight="600" fill="#37474F" transform="rotate(-90,62,353)">Engenharia &amp; Planejamento</text>
  <line x1="90" y1="28" x2="90" y2="418" stroke="#CFD8DC" stroke-width="0.8"/>

  <!-- ===== LANE 1 (cy=93) ===== -->
  <circle cx="118" cy="93" r="13" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <circle cx="118" cy="93" r="5" fill="#43A047"/>
  <text x="118" y="117" text-anchor="middle" font-size="7.5" fill="#78909C">Início</text>
  <line x1="131" y1="93" x2="142" y2="93" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T1 Falha Identificada -->
  <rect x="144" y="75" width="138" height="36" rx="5" fill="#fff" stroke="#90A4AE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="213" y="90" text-anchor="middle" font-size="9" fill="#1B2A3D">Falha Identificada</text>
  <text x="213" y="104" text-anchor="middle" font-size="9" fill="#1B2A3D">/ Alerta</text>
  <line x1="282" y1="93" x2="298" y2="93" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T2 Emitir OS -->
  <rect x="300" y="75" width="130" height="36" rx="5" fill="#fff" stroke="#90A4AE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="365" y="90" text-anchor="middle" font-size="9" fill="#1B2A3D">Emitir Ordem</text>
  <text x="365" y="104" text-anchor="middle" font-size="9" fill="#1B2A3D">de Serviço</text>
  <!-- T2 ↓ Lane 2 -->
  <path d="M 365,111 L 365,223" stroke="#546E7A" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ===== LANE 2 (cy=223) ===== -->
  <line x1="365" y1="223" x2="381" y2="223" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW1 Tipo OS? -->
  <polygon points="404,201 426,223 404,245 382,223" fill="#FDD835" stroke="#E6AC00" stroke-width="1.5"/>
  <text x="404" y="219" text-anchor="middle" font-size="7" font-weight="700" fill="#1B2A3D">Tipo</text>
  <text x="404" y="229" text-anchor="middle" font-size="7" font-weight="700" fill="#1B2A3D">OS?</text>

  <!-- GW1 → Corretiva (direita) -->
  <line x1="426" y1="223" x2="444" y2="223" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="434" y="216" text-anchor="middle" font-size="7" fill="#546E7A">Corretiva</text>

  <!-- T3 Diagnóstico da Falha -->
  <rect x="446" y="205" width="135" height="36" rx="5" fill="#fff" stroke="#90A4AE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="513" y="220" text-anchor="middle" font-size="9" fill="#1B2A3D">Diagnóstico</text>
  <text x="513" y="234" text-anchor="middle" font-size="9" fill="#1B2A3D">da Falha</text>
  <line x1="581" y1="223" x2="597" y2="223" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T4 Execução do Reparo -->
  <rect x="599" y="205" width="135" height="36" rx="5" fill="#fff" stroke="#90A4AE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="666" y="220" text-anchor="middle" font-size="9" fill="#1B2A3D">Execução</text>
  <text x="666" y="234" text-anchor="middle" font-size="9" fill="#1B2A3D">do Reparo</text>
  <line x1="734" y1="223" x2="750" y2="223" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T5 Teste Funcional -->
  <rect x="752" y="205" width="125" height="36" rx="5" fill="#fff" stroke="#90A4AE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="814" y="220" text-anchor="middle" font-size="9" fill="#1B2A3D">Teste</text>
  <text x="814" y="234" text-anchor="middle" font-size="9" fill="#1B2A3D">Funcional</text>
  <!-- T5 ↓ Lane 3 -->
  <path d="M 877,223 L 895,223 L 895,353" stroke="#546E7A" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- GW1 → Preventiva (baixo ↓ Lane 3) -->
  <path d="M 404,245 L 404,353" stroke="#E65100" stroke-width="1.5" fill="none" marker-end="url(#ao)"/>
  <text x="415" y="302" font-size="7" fill="#E65100">Prev.</text>

  <!-- ===== LANE 3 (cy=353) ===== -->
  <!-- Caminho Preventiva -->
  <line x1="404" y1="353" x2="422" y2="353" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="424" y="335" width="148" height="36" rx="5" fill="#fff" stroke="#90A4AE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="498" y="350" text-anchor="middle" font-size="9" fill="#1B2A3D">Planejar &amp;</text>
  <text x="498" y="364" text-anchor="middle" font-size="9" fill="#1B2A3D">Agendar</text>
  <line x1="572" y1="353" x2="583" y2="353" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <circle cx="596" cy="353" r="13" fill="none" stroke="#C62828" stroke-width="4.5"/>
  <text x="596" y="377" text-anchor="middle" font-size="7.5" fill="#78909C">Fim</text>

  <!-- Caminho Corretiva -->
  <line x1="895" y1="353" x2="913" y2="353" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="915" y="335" width="148" height="36" rx="5" fill="#fff" stroke="#90A4AE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="989" y="350" text-anchor="middle" font-size="9" fill="#1B2A3D">Registar &amp;</text>
  <text x="989" y="364" text-anchor="middle" font-size="9" fill="#1B2A3D">Análise RCM</text>
  <line x1="1063" y1="353" x2="1079" y2="353" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T7 Liberar Equipamento -->
  <rect x="1081" y="335" width="100" height="36" rx="5" fill="#fff" stroke="#90A4AE" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1131" y="350" text-anchor="middle" font-size="9" fill="#1B2A3D">Liberar</text>
  <text x="1131" y="364" text-anchor="middle" font-size="9" fill="#1B2A3D">Equipamento</text>
  <line x1="1181" y1="353" x2="1182" y2="353" stroke="#546E7A" stroke-width="1.5" marker-end="url(#a)"/>
  <circle cx="1184" cy="353" r="13" fill="none" stroke="#C62828" stroke-width="4.5"/>
  <text x="1184" y="377" text-anchor="middle" font-size="7.5" fill="#78909C">Fim</text>
</svg>
