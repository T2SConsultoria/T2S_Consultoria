<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="Inter,Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6B7280"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2E7D32"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#C62828"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".08"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="440" fill="#FAFAF8" rx="6"/>
  <!-- Gold accent top -->
  <rect width="1200" height="3" fill="#C8963E" rx="1"/>

  <!-- Title -->
  <text x="600" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1929" letter-spacing=".5">Produção Industrial — Linha de Envase</text>

  <!-- Pool border -->
  <rect x="2" y="34" width="1196" height="400" fill="none" stroke="#D5CFC5" stroke-width="1" rx="4"/>
  <!-- Pool header -->
  <rect x="2" y="34" width="30" height="400" fill="#0B1929" rx="4"/>
  <rect x="6" y="34" width="26" height="400" fill="#0B1929"/>
  <text x="17" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#F5F0E8" letter-spacing="2" transform="rotate(-90,17,236)">LINHA DE PRODUÇÃO</text>

  <!-- Lane labels -->
  <rect x="32" y="34" width="52" height="130" fill="#F3F0EA"/>
  <text x="58" y="102" text-anchor="middle" font-size="8" font-weight="600" fill="#4A4539" transform="rotate(-90,58,102)">Recebimento &amp; Logística</text>
  <line x1="32" y1="164" x2="1198" y2="164" stroke="#D5CFC5" stroke-width=".8"/>

  <rect x="32" y="164" width="52" height="130" fill="#F3F0EA"/>
  <text x="58" y="232" text-anchor="middle" font-size="8" font-weight="600" fill="#4A4539" transform="rotate(-90,58,232)">Produção</text>
  <line x1="32" y1="294" x2="1198" y2="294" stroke="#D5CFC5" stroke-width=".8"/>

  <rect x="32" y="294" width="52" height="140" fill="#F3F0EA"/>
  <text x="58" y="367" text-anchor="middle" font-size="8" font-weight="600" fill="#4A4539" transform="rotate(-90,58,367)">CQ &amp; Expedição</text>

  <line x1="84" y1="34" x2="84" y2="434" stroke="#D5CFC5" stroke-width=".6"/>

  <!-- ===== LANE 1 — cy=100 ===== -->

  <!-- Start -->
  <circle cx="112" cy="100" r="12" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <circle cx="112" cy="100" r="4.5" fill="#43A047"/>
  <line x1="124" y1="100" x2="143" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T1 Receber Matéria-Prima -->
  <rect x="147" y="82" width="126" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="210" y="97" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Receber</text>
  <text x="210" y="109" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Matéria-Prima</text>
  <line x1="273" y1="100" x2="295" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T2 Inspeção de Recebimento -->
  <rect x="299" y="82" width="132" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="365" y="97" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Inspeção de</text>
  <text x="365" y="109" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Recebimento</text>
  <line x1="431" y1="100" x2="447" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW1 MP Conforme? -->
  <polygon points="470,78 492,100 470,122 448,100" fill="#F5E6C8" stroke="#C8963E" stroke-width="1.5"/>
  <text x="470" y="97" text-anchor="middle" font-size="8" font-weight="700" fill="#1E3A5F">MP</text>
  <text x="470" y="107" text-anchor="middle" font-size="8" font-weight="700" fill="#1E3A5F">OK?</text>

  <!-- GW1 Não → Devolver MP -->
  <line x1="492" y1="100" x2="515" y2="100" stroke="#C62828" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="503" y="94" text-anchor="middle" font-size="7.5" font-weight="600" fill="#C62828">Não</text>
  <rect x="519" y="82" width="126" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="582" y="97" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Devolver</text>
  <text x="582" y="109" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Matéria-Prima</text>
  <line x1="645" y1="100" x2="660" y2="100" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- End (rejection) -->
  <circle cx="674" cy="100" r="11" fill="none" stroke="#C62828" stroke-width="3.5"/>
  <text x="674" y="123" text-anchor="middle" font-size="7" fill="#9CA3AF">Fim</text>

  <!-- GW1 Sim ↓ to Lane 2 -->
  <path d="M470,122 L470,229" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#ag)"/>
  <text x="480" y="150" font-size="7.5" font-weight="600" fill="#2E7D32">Sim</text>

  <!-- ===== LANE 2 — cy=229 ===== -->

  <line x1="470" y1="229" x2="490" y2="229" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T3 Preparar Lote -->
  <rect x="494" y="211" width="120" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="554" y="226" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Preparar</text>
  <text x="554" y="238" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Lote</text>
  <line x1="614" y1="229" x2="635" y2="229" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T4 Produção / Envase -->
  <rect x="639" y="211" width="130" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="704" y="226" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Produção /</text>
  <text x="704" y="238" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Envase</text>
  <line x1="769" y1="229" x2="790" y2="229" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- T5 Embalagem e Rotulagem -->
  <rect x="794" y="211" width="138" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="863" y="226" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Embalagem</text>
  <text x="863" y="238" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">e Rotulagem</text>

  <!-- T5 → Lane 3 (vertical down) -->
  <path d="M863,247 L863,364" stroke="#6B7280" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ===== LANE 3 — cy=364 ===== -->

  <!-- T6 Controle de Qualidade -->
  <rect x="890" y="346" width="138" height="36" rx="6" fill="#fff" stroke="#B8B0A4" stroke-width="1.2" filter="url(#sh)"/>
  <text x="959" y="361" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">Controle</text>
  <text x="959" y="373" text-anchor="middle" font-size="9" font-weight="500" fill="#1E3A5F">de Qualidade</text>

  <!-- Connect vertical to T6 -->
  <line x1="863" y1="364" x2="886" y2="364" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <line x1="1028" y1="364" x2="1047" y2="364" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- GW2 Lote Aprovado? -->
  <polygon points="1070,342 1092,364 1070,386 1048,364" fill="#F5E6C8" stroke="#C8963E" stroke-width="1.5"/>
  <text x="1070" y="361" text-anchor="middle" font-size="8" font-weight="700" fill="#1E3A5F">Lote</text>
  <text x="1070" y="371" text-anchor="middle" font-size="8" font-weight="700" fill="#1E3A5F">OK?</text>

  <!-- GW2 Sim → Expedição → Fim -->
  <line x1="1092" y1="364" x2="1110" y2="364" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="1100" y="358" text-anchor="middle" font-size="7.5" font-weight="600" fill="#2E7D32">Sim</text>
  <circle cx="1130" cy="364" r="11" fill="none" stroke="#C62828" stroke-width="3.5"/>
  <text x="1130" y="387" text-anchor="middle" font-size="7" fill="#9CA3AF">Fim</text>

  <!-- GW2 Não → Retrabalho (dashed back to T4) -->
  <path d="M1070,342 L1070,229 L773,229" stroke="#C62828" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="1080" y="286" font-size="7.5" font-weight="600" fill="#C62828">Não</text>
  <text x="920" y="222" font-size="7" fill="#C62828">↩ Retrabalho</text>

  <!-- Gold accent bottom -->
  <rect y="437" width="1200" height="3" fill="#C8963E" rx="1"/>
</svg>